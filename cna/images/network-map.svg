<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Threaded network map</title>
  <desc id="desc">Multiple clients connect to a Python socket server that creates one thread per accepted connection.</desc>
  <rect width="900" height="520" rx="20" fill="#f4f8fb"/>
  <rect x="330" y="118" width="240" height="210" rx="14" fill="#ffffff" stroke="#0f766e" stroke-width="4"/>
  <text x="450" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#115e59">Python Socket Server</text>
  <text x="450" y="190" text-anchor="middle" font-family="Consolas, monospace" font-size="18" fill="#172033">bind -> listen -> accept</text>
  <rect x="360" y="220" width="180" height="68" rx="10" fill="#edf9f6" stroke="#8fd4ca"/>
  <text x="450" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#172033">Thread pool view</text>
  <text x="450" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#536274">one thread per client</text>
  <g fill="#ffffff" stroke="#ccd8e5" stroke-width="3">
    <rect x="72" y="78" width="154" height="78" rx="12"/>
    <rect x="72" y="218" width="154" height="78" rx="12"/>
    <rect x="72" y="358" width="154" height="78" rx="12"/>
    <rect x="674" y="118" width="154" height="78" rx="12"/>
    <rect x="674" y="304" width="154" height="78" rx="12"/>
  </g>
  <g font-family="Arial, sans-serif" font-weight="700" font-size="18" fill="#172033">
    <text x="149" y="124" text-anchor="middle">Client 1</text>
    <text x="149" y="264" text-anchor="middle">Client 2</text>
    <text x="149" y="404" text-anchor="middle">Client 3</text>
    <text x="751" y="164" text-anchor="middle">Client 4</text>
    <text x="751" y="350" text-anchor="middle">Client 5</text>
  </g>
  <g stroke-linecap="round" stroke-width="6" fill="none">
    <path d="M226 117 C270 118 286 160 330 172" stroke="#0f766e"/>
    <path d="M226 257 C270 257 286 233 330 230" stroke="#b7791f"/>
    <path d="M226 397 C284 390 300 315 330 286" stroke="#2563eb"/>
    <path d="M674 157 C618 158 610 180 570 194" stroke="#0f766e"/>
    <path d="M674 343 C620 339 606 288 570 274" stroke="#16803c"/>
  </g>
  <g fill="#172033" font-family="Consolas, monospace" font-size="14">
    <text x="263" y="105">TCP</text>
    <text x="260" y="248">GET /</text>
    <text x="254" y="378">HTTP/1.0</text>
    <text x="603" y="148">GET /css</text>
    <text x="604" y="330">200 OK</text>
  </g>
  <rect x="270" y="382" width="360" height="70" rx="12" fill="#ffffff" stroke="#ccd8e5" stroke-width="3"/>
  <text x="450" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#172033">Concurrency goal</text>
  <text x="450" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#536274">clients progress independently instead of waiting in one line</text>
</svg>
