<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">HTTP request and response flow</title>
  <desc id="desc">A browser sends a request line and headers to the static server, which returns an HTTP/1.0 response.</desc>
  <rect width="900" height="520" rx="20" fill="#f4f8fb"/>
  <rect x="70" y="120" width="230" height="210" rx="14" fill="#ffffff" stroke="#ccd8e5" stroke-width="3"/>
  <rect x="600" y="120" width="230" height="210" rx="14" fill="#ffffff" stroke="#ccd8e5" stroke-width="3"/>
  <text x="185" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#172033">Browser Client</text>
  <text x="715" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#172033">Socket Server</text>
  <rect x="100" y="200" width="170" height="72" rx="10" fill="#edf9f6" stroke="#8fd4ca"/>
  <text x="185" y="229" text-anchor="middle" font-family="Consolas, monospace" font-size="17" font-weight="700" fill="#115e59">GET /public</text>
  <text x="185" y="254" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#115e59">HTTP/1.0</text>
  <rect x="630" y="200" width="170" height="72" rx="10" fill="#eef4ff" stroke="#9db7f4"/>
  <text x="715" y="229" text-anchor="middle" font-family="Consolas, monospace" font-size="17" font-weight="700" fill="#2563eb">parse path</text>
  <text x="715" y="254" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#2563eb">build bytes</text>
  <path d="M316 198 C410 150 488 150 584 198" fill="none" stroke="#0f766e" stroke-width="7" stroke-linecap="round"/>
  <polygon points="584,198 560,184 560,212" fill="#0f766e"/>
  <path d="M584 294 C490 356 410 356 316 294" fill="none" stroke="#b7791f" stroke-width="7" stroke-linecap="round"/>
  <polygon points="316,294 340,280 340,308" fill="#b7791f"/>
  <text x="450" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f766e">HTTP request bytes</text>
  <text x="450" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#8a560f">HTTP response bytes</text>
  <rect x="272" y="414" width="356" height="58" rx="10" fill="#ffffff" stroke="#ccd8e5" stroke-width="3"/>
  <text x="450" y="438" text-anchor="middle" font-family="Consolas, monospace" font-size="16" fill="#172033">HTTP/1.0 200 OK</text>
  <text x="450" y="462" text-anchor="middle" font-family="Consolas, monospace" font-size="15" fill="#536274">Content-Length + Content-Type + body</text>
  <g fill="#ffffff" stroke="#ccd8e5" stroke-width="3">
    <rect x="348" y="210" width="82" height="52" rx="8"/>
    <rect x="454" y="210" width="98" height="52" rx="8"/>
  </g>
  <text x="389" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#172033">CRLF</text>
  <text x="503" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#172033">Headers</text>
</svg>
